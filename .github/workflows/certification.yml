name: LLM Certification

on:
  # Manual trigger with configurable model
  workflow_dispatch:
    inputs:
      model:
        description: 'Model to certify'
        required: false
        default: 'claude-haiku-4-5-20251001'
      threshold:
        description: 'Pass threshold (0.0-1.0)'
        required: false
        default: '0.85'

  # Auto-trigger on changes to prompts, evaluators, or certification config
  push:
    branches: [main]
    paths:
      - 'evaluators.py'
      - 'run_certification.py'
      - 'setup_prompts.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.python-version'
      - '.env.example'

env:
  LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
  LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
  LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

jobs:
  certify-financebench:
    name: FinanceBench Certification
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6

      - name: Run FinanceBench certification
        run: |
          uv run python run_certification.py \
            --dataset certification/financebench-sample \
            --model ${{ github.event.inputs.model || 'claude-haiku-4-5-20251001' }} \
            --threshold ${{ github.event.inputs.threshold || '0.85' }} \
            --ci

  certify-fpb:
    name: FPB Sentiment Certification
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6

      - name: Run FPB sentiment certification
        run: |
          uv run python run_certification.py \
            --dataset certification/fpb-sample \
            --model ${{ github.event.inputs.model || 'claude-haiku-4-5-20251001' }} \
            --threshold ${{ github.event.inputs.threshold || '0.85' }} \
            --ci

  pytest-gate:
    name: Pytest Certification Gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [certify-financebench, certify-fpb]
    if: always()

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6

      - name: Run certification tests
        env:
          CERT_MODEL: ${{ github.event.inputs.model || 'claude-haiku-4-5-20251001' }}
          CERT_THRESHOLD: ${{ github.event.inputs.threshold || '0.85' }}
        run: uv run pytest tests/test_certification.py -v --tb=short
